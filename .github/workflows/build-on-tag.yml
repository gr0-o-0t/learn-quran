name: Build on tag

# Builds every real (non-web) platform target when a semver tag is pushed.
# Web is intentionally excluded: onnxruntime, llama_ffi.dart, and Drift's
# NativeDatabase are all dart:ffi-based and cannot compile to JavaScript at
# all — see Tracker.md Phase 11 for details. That needs a separate
# architecture project (Drift WASM backend, a JS-interop embedding runtime,
# a browser-capable LLM runtime), not a CI config.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  FLUTTER_VERSION: "3.44.2"

# Needed by the release job to create a release and upload assets to it.
permissions:
  contents: write

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      # No android/key.properties secret is configured, so this falls back
      # to debug signing (android/app/build.gradle.kts already handles that
      # gracefully) — fine for a build-verification artifact, but this is
      # NOT a Play Store-ready release. Add key.properties/keystore secrets
      # here to produce a real release-signed build.
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: iOS (unsigned .app)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      # No Apple Developer signing certificates/provisioning profiles are
      # configured. --no-codesign alone isn't enough for a device
      # (ios-release/arm64) build — Xcode still resolves a signing identity
      # during embed/dSYM and fails without a Development Team. Building
      # for the simulator instead needs no signing at all (this is exactly
      # what Flutter's own error message for the device case recommends),
      # while still proving the dart:ffi/native code compiles under a real
      # Xcode toolchain, which this project's own dev sandbox cannot do at
      # all. It is not an installable/distributable on-device IPA.
      - run: flutter build ios --release --no-codesign --simulator

      - run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphonesimulator/Runner.app Runner-iOS-simulator-unsigned.zip

      - uses: actions/upload-artifact@v7
        with:
          name: ios-app-unsigned
          path: Runner-iOS-simulator-unsigned.zip
          if-no-files-found: error

  macos:
    name: macOS (.app)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      # Same signing caveat as iOS: no Developer ID certificate configured,
      # so codesigning is disabled and the .app is unsigned/build-verification
      # only, not notarization-ready for distribution outside this CI run.
      - run: flutter build macos --release
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"

      - run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/Runner.app Runner-macOS-unsigned.zip

      - uses: actions/upload-artifact@v7
        with:
          name: macos-app-unsigned
          path: Runner-macOS-unsigned.zip
          if-no-files-found: error

  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter build windows --release

      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath learn_quran-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-app
          path: learn_quran-windows.zip
          if-no-files-found: error

  linux:
    name: Linux (bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Matches the toolchain installed by hand for this same build in the
      # project's dev sandbox: clang/ninja/pkg-config for the CMake-based
      # Flutter Linux build, GTK3 dev headers for the embedder, and
      # GStreamer dev headers for the audioplayers_linux plugin.
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter build linux --release

      - run: tar -czf learn_quran-linux.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: learn_quran-linux.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    needs: [android, ios, macos, windows, linux]
    runs-on: ubuntu-latest
    steps:
      # merge-multiple flattens every job's single artifact file into one
      # directory instead of nesting each under an artifact-name subfolder
      # — safe here since every artifact above has a distinct filename.
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
