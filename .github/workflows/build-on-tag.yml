name: Build on tag

# Builds every real (non-web) platform target when a semver tag is pushed.
# Web is intentionally excluded: onnxruntime, llama_ffi.dart, and Drift's
# NativeDatabase are all dart:ffi-based and cannot compile to JavaScript at
# all — see Tracker.md Phase 11 for details. That needs a separate
# architecture project (Drift WASM backend, a JS-interop embedding runtime,
# a browser-capable LLM runtime), not a CI config.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  FLUTTER_VERSION: "3.44.2"

# Needed by the release job to create a release and upload assets to it.
permissions:
  contents: write

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      # No android/key.properties secret is configured, so this falls back
      # to debug signing (android/app/build.gradle.kts already handles that
      # gracefully) — fine for a build-verification artifact, but this is
      # NOT a Play Store-ready release. Add key.properties/keystore secrets
      # here to produce a real release-signed build.
      #
      # --split-per-abi produces one APK per ABI (armeabi-v7a, arm64-v8a,
      # x86_64) instead of one fat APK carrying all three sets of native
      # libraries — smaller downloads for direct-APK distribution (this
      # release job, not Play Store, which already does its own splitting
      # from an AAB).
      - run: flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

  ios:
    name: iOS (unsigned .app)
    # Pinned rather than macos-latest: it's due to migrate to a new
    # default Xcode/macOS mid-2026 (github.com/actions/runner-images#14167),
    # and switching Xcode versions mid-job to chase a pubspec dependency's
    # SDK requirement (see the connectivity_plus pin in pubspec.yaml) proved
    # flaky here — CoreSimulatorService intermittently failed to resolve an
    # iOS Simulator destination after a `xcode-select -s` mid-job. Staying
    # on the runner's own default Xcode avoids that entirely.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-ios-${{ hashFiles('ios/Podfile', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-ios-

      - uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      # No Apple Developer signing certificates/provisioning profiles are
      # configured. --no-codesign alone isn't enough for a device
      # (ios-release/arm64) build — Xcode still resolves a signing identity
      # during embed/dSYM and fails without a Development Team. Building
      # for the simulator instead needs no signing at all (this is exactly
      # what Flutter's own error message for the device case recommends),
      # while still proving the dart:ffi/native code compiles under a real
      # Xcode toolchain, which this project's own dev sandbox cannot do at
      # all. It is not an installable/distributable on-device IPA.
      # Flutter only supports debug builds for the simulator target
      # (release/profile require a real device toolchain).
      - run: flutter build ios --debug --no-codesign --simulator

      - run: |
          APP_PATH=$(find build/ios -maxdepth 4 -name "*.app" -type d | head -n1)
          test -n "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" Runner-iOS-simulator-unsigned.zip

      - uses: actions/upload-artifact@v7
        with:
          name: ios-app-unsigned
          path: Runner-iOS-simulator-unsigned.zip
          if-no-files-found: error

  macos:
    name: macOS (.app)
    # See the iOS job above for why this is pinned instead of macos-latest.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-macos-${{ hashFiles('macos/Podfile', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-macos-

      - uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      # Same signing caveat as iOS: no Developer ID certificate configured,
      # so codesigning is disabled and the .app is unsigned/build-verification
      # only, not notarization-ready for distribution outside this CI run.
      - run: flutter build macos --release
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"

      - run: |
          APP_PATH=$(find build/macos -maxdepth 6 -name "*.app" -type d | head -n1)
          test -n "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" Runner-macOS-unsigned.zip

      - uses: actions/upload-artifact@v7
        with:
          name: macos-app-unsigned
          path: Runner-macOS-unsigned.zip
          if-no-files-found: error

  windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: ~/AppData/Local/Pub/Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter build windows --release

      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath learn_quran-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows-app
          path: learn_quran-windows.zip
          if-no-files-found: error

  linux:
    name: Linux (bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Matches the toolchain installed by hand for this same build in the
      # project's dev sandbox: clang/ninja/pkg-config for the CMake-based
      # Flutter Linux build, GTK3 dev headers for the embedder, and
      # GStreamer dev headers for the audioplayers_linux plugin. The rest
      # (gir1.2-gtk-3.0, libgirepository1.0-dev, librsvg2-dev, libfuse2,
      # patchelf) are linuxdeploy/linuxdeploy-plugin-gtk's own documented
      # build-time dependencies for the AppImage packaging step below.
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gir1.2-gtk-3.0 libgirepository1.0-dev librsvg2-dev libfuse2 patchelf

      - uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # *.g.dart (Drift tables/companions, Riverpod providers) are
      # gitignored — generate them here, same as local dev.
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter build linux --release

      - run: tar -czf learn_quran-linux.tar.gz -C build/linux/x64/release/bundle .

      # GTK3 and GStreamer aren't distributed as static libraries (and don't
      # support static linking upstream — their dynamic module loading for
      # themes/codecs breaks), so a true static binary isn't possible here.
      # An AppImage is the practical equivalent: it bundles those shared
      # libraries alongside the app so end users don't need to apt-install
      # anything. linuxdeploy only picks up the main executable's own ldd
      # dependencies, not Flutter's bundle-relative lib/ and data/
      # directories, so those are copied into the AppDir by hand first.
      - run: |
          wget -qc "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -qc "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          PATH="$PWD:$PATH" ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            -e AppDir/usr/bin/learn_quran \
            -d linux/learn_quran.desktop \
            -i linux/learn_quran.png \
            --plugin gtk \
            --output appimage

          mv ./*.AppImage learn_quran-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: |
            learn_quran-linux.tar.gz
            learn_quran-linux-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Publish release
    needs: [android, ios, macos, windows, linux]
    runs-on: ubuntu-latest
    steps:
      # merge-multiple flattens every job's single artifact file into one
      # directory instead of nesting each under an artifact-name subfolder
      # — safe here since every artifact above has a distinct filename.
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
