name: Build and Publish Knowledge Base

on:
  push:
    tags:
      - "kb-v[0-9]+.[0-9]+.[0-9]+*"

env:
  FLUTTER_VERSION: "3.44.2"

permissions:
  contents: write

jobs:
  build-kb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#kb-v}" >> "$GITHUB_OUTPUT"

      - name: Build kb.db
        # `dart run` cannot host this — build_kb.dart transitively uses
        # rootBundle (via EmbeddingService), which needs Flutter engine
        # bindings. tool/build_kb_runner.dart hosts the same, unmodified
        # build_kb.main() under `flutter test`, which does provide them.
        #
        # LD_LIBRARY_PATH must point at onnxruntime's bundled .so: unlike
        # `flutter build`, which copies it next to the compiled executable,
        # `flutter test` runs via flutter_tester with no such bundling step,
        # so the dynamic linker can't find `libonnxruntime.so.1.15.1` by
        # its bare name otherwise. Without this, EmbeddingService.init()
        # throws, is silently caught, and falls back to random mock
        # embeddings for the entire build — confirmed to be exactly what
        # happened for every kb.db built before this fix (kb-v1.0.0,
        # kb-v1.0.1): retrieval was comparing semantically meaningless
        # vectors the whole time. The package path is resolved dynamically
        # from .dart_tool/package_config.json (populated by `flutter pub
        # get` above) rather than hardcoding a pub-cache path, since the
        # exact resolved onnxruntime version can change.
        run: |
          ONNX_DIR=$(python3 -c "
          import json, sys
          data = json.load(open('.dart_tool/package_config.json'))
          for pkg in data['packages']:
              if pkg['name'] == 'onnxruntime':
                  print(pkg['rootUri'].replace('file://', ''))
                  sys.exit(0)
          sys.exit('onnxruntime not found in .dart_tool/package_config.json')
          ")
          # Fail loudly rather than silently building with mock embeddings
          # a third time: if the package lookup above ever finds nothing to
          # print, ONNX_DIR is empty and the .so genuinely won't be there.
          test -f "$ONNX_DIR/linux/libonnxruntime.so.1.15.1" || {
            echo "::error::libonnxruntime.so.1.15.1 not found at '$ONNX_DIR/linux' — refusing to build with silently-mocked embeddings."
            exit 1
          }
          export LD_LIBRARY_PATH="$ONNX_DIR/linux:$LD_LIBRARY_PATH"
          flutter test tool/build_kb_runner.dart --timeout=none \
            --dart-define=KB_OUTPUT=kb.db \
            --dart-define=KB_VERSION="${{ steps.version.outputs.version }}"

      - name: Compute checksum and size
        run: |
          sha256sum kb.db | tee kb.db.sha256
          stat -c '%s' kb.db | tee kb.db.size

      - uses: actions/upload-artifact@v7
        with:
          name: kb-release
          path: |
            kb.db
            kb.db.sha256
            kb.db.size
          if-no-files-found: error

  release:
    needs: build-kb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: kb-release
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
