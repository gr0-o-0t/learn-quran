name: learn_quran
description: An offline mobile app to help people learn and understand the Quran.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Databases & FFI
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlite3: ^3.0.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # Utilities
  uuid: ^4.3.3
  geolocator: ^14.0.3
  adhan: ^2.0.0 # Prayer times calculation

  # UI / Audio / Notifications
  google_fonts: ^8.1.0
  audioplayers: ^6.0.0
  flutter_local_notifications: ^22.0.0
  workmanager: ^0.9.0+3

  # Cupertino Icons
  cupertino_icons: ^1.0.6
  timezone: ^0.11.0
  sqlite_vector: ^1.0.0
  onnxruntime: ^1.4.1
  ffi: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.16.0
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/databases/quran_base.db
    - assets/models/
