name: learn_quran
description: An offline mobile app to help people learn and understand the Quran.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Databases & FFI
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlite3: ^3.3.4
  path_provider: ^2.1.6
  path: ^1.9.1

  # Utilities
  uuid: ^4.5.3
  geolocator: ^14.0.3
  adhan: ^2.0.0+1 # Prayer times calculation
  meta: ^1.18.0

  # UI / Audio / Notifications
  google_fonts: ^8.1.0
  audioplayers: ^6.8.1
  flutter_local_notifications: ^22.0.1
  android_alarm_manager_plus: ^5.1.0

  # Runtime model downloads
  http: ^1.6.0
  crypto: ^3.0.7
  # Background-capable downloads (survive screen lock / app backgrounding)
  # for the AI model and knowledge base downloads.
  background_downloader: ^9.5.5
  # Pinned below 7.1.0: that and later reference NWPath.isUltraConstrained,
  # which only exists in the macOS/iOS 26 SDKs. Our usage (checkConnectivity
  # + ConnectivityResult.wifi) has been stable since well before 7.0.0, so
  # there's no functionality cost, and it lets iOS/macOS CI build with
  # whatever Xcode the runner ships by default.
  connectivity_plus: 7.0.0

  # Cupertino Icons
  cupertino_icons: ^1.0.9
  timezone: ^0.11.1
  sqlite_vector: ^1.0.0
  onnxruntime: ^1.4.1
  bert_tokenizer: ^1.1.1
  ffi: ^2.2.0

  # On-device LLM inference (llama.cpp GGUF backend via native-assets hooks —
  # fetches prebuilt runtimes per platform automatically, no manual C++ build)
  llamadart: ^0.8.12
  # Lets Flutter iOS/macOS builds link the llama.cpp XCFramework via SwiftPM
  # instead of native-assets there; llamadart uses this automatically when present.
  llamadart_llama_cpp_flutter: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0 # 2.34.1+1 exists but needs analyzer ^13.0.0, which conflicts with riverpod_generator ^4.0.4 (latest, needs analyzer ^12.0.0)
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  args: ^2.7.0

# We only ever load .gguf models (see model_catalog.dart), never .litertlm —
# skip bundling the litert_lm native runtime to keep binary size down.
hooks:
  user_defines:
    llamadart:
      llamadart_native_runtimes: [llama_cpp]

flutter:
  uses-material-design: true

  assets:
    - assets/models/
